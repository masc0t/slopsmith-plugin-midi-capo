<div>
    <label class="text-sm font-medium text-gray-400 mb-2 block">Virtual Capo</label>
    <p class="text-xs text-gray-500 mb-3">Automatically send a CC to set the Pitch block Virtual Capo Shift based on song tuning. Assumes your guitar is in E Standard or Drop D.</p>
    <div class="flex items-center gap-4 flex-wrap" id="midi-capo-settings">
        <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" id="midi-capo-enabled"
                onchange="localStorage.setItem('midi_capo_enabled', this.checked)"
                class="accent-amber-500">
            <span class="text-xs text-gray-300">Enable</span>
        </label>
        <div class="flex items-center gap-2">
            <label class="text-xs text-gray-500">Channel</label>
            <input type="number" id="midi-capo-channel" min="0" max="15" value="0"
                onchange="localStorage.setItem('midi_capo_channel', this.value)"
                class="w-14 bg-dark-700 border border-gray-700 rounded-lg px-2 py-1 text-xs text-gray-300 outline-none">
        </div>
        <div class="flex items-center gap-2">
            <label class="text-xs text-gray-500">CC#</label>
            <input type="number" id="midi-capo-cc" min="0" max="127" value="18"
                onchange="localStorage.setItem('midi_capo_cc', this.value)"
                class="w-14 bg-dark-700 border border-gray-700 rounded-lg px-2 py-1 text-xs text-gray-300 outline-none">
        </div>
    </div>
</div>
