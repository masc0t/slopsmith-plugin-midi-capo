<div class="max-w-4xl mx-auto px-6 pt-24 pb-16">
    <button onclick="showScreen('home')" class="text-gray-500 hover:text-white text-sm mb-6 flex items-center gap-1">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg> Back
    </button>
    <h2 class="text-3xl font-bold text-white mb-2">Virtual Capo</h2>
    <p class="text-gray-500 mb-8">Automatically set the Virtual Capo Shift on your Fractal device based on song tuning.</p>

    <!-- MIDI device status -->
    <div id="capo-midi-status" class="mb-6"></div>

    <!-- Virtual Capo status -->
    <div id="capo-status" class="mb-6"></div>

    <!-- Test area -->
    <div id="capo-test" class="mt-8 hidden">
        <h3 class="text-sm font-semibold text-gray-300 mb-3">Test Virtual Capo</h3>
        <div class="flex gap-3 items-center flex-wrap">
            <label class="text-xs text-gray-500">Shift</label>
            <input type="number" id="capo-test-shift" min="-24" max="24" value="0" class="w-16 bg-dark-700 border border-gray-700 rounded-lg px-2 py-1 text-xs text-gray-300 outline-none">
            <button onclick="capoTestSend()" class="px-4 py-1.5 bg-accent hover:bg-accent-light rounded-lg text-xs text-white transition">Send</button>
        </div>
        <p class="text-[10px] text-gray-600 mt-2">0 = E Std / Drop D, -1 = Eb Std / Drop C#, -2 = D Std / Drop C, -3 = C# Std / Drop B</p>
    </div>
</div>
